<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Snake Web</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <header class="topbar">
      <div class="brand">
        <h1 data-i18n="app_title">Neon Snake Web</h1>
        <p data-i18n="app_subtitle">浏览器免安装版: 单人 + 双人在线</p>
      </div>
      <div class="top-actions">
        <button class="tab-btn active" data-tab="single" data-i18n="tab_single">单人模式</button>
        <button class="tab-btn" data-tab="online" data-i18n="tab_online">双人在线</button>
        <button id="openSettingsBtn" class="ghost-btn" data-i18n="open_settings">设置</button>
      </div>
    </header>

    <main class="main">
      <section id="tab-single" class="tab-panel active">
        <div class="single-layout">
          <div class="board-card">
            <div class="board-stage" id="singleStage">
              <canvas id="singleCanvas" width="672" height="576"></canvas>
              <div id="singleOverlay" class="canvas-overlay hidden">
                <div class="overlay-title" id="singleOverlayTitle">准备开始</div>
                <div class="overlay-sub" id="singleOverlaySub">按方向键 / WASD / 点击方向键开始</div>
              </div>
              <div id="reviveOverlay" class="canvas-overlay hidden">
                <div class="overlay-title" data-i18n="revive_prompt_title">无敌模式: 是否复活?</div>
                <div class="overlay-sub" data-i18n="revive_prompt_sub">将从更安全的位置继续。</div>
                <div class="overlay-actions">
                  <button id="reviveYesBtn" data-i18n="revive_yes">复活继续 (Y)</button>
                  <button id="reviveNoBtn" data-i18n="revive_no">结束本局 (N)</button>
                </div>
              </div>
            </div>
          </div>

          <aside class="side-card">
            <h2 data-i18n="single_panel_title">单人信息</h2>
            <div class="stat-grid">
              <div>
                <span data-i18n="score">Score</span>
                <strong id="singleScore">0</strong>
              </div>
              <div>
                <span data-i18n="best">Best</span>
                <strong id="singleBest">0</strong>
              </div>
              <div>
                <span data-i18n="length">Length</span>
                <strong id="singleLength">4</strong>
              </div>
              <div>
                <span data-i18n="best_length">Best Length</span>
                <strong id="singleBestLength">4</strong>
              </div>
            </div>
            <div class="meta-row" id="singleMetaRow">-</div>
            <div class="single-quick-card">
              <label>
                <span data-i18n="speed_label">速度</span>
                <input id="singleSpeedInline" type="range" min="1" max="10" value="5" />
              </label>
              <div class="quick-speed-row">
                <strong id="singleSpeedInlineValue">5</strong>
              </div>
              <div class="quick-tags">
                <span id="singleDifficultyTag">进阶</span>
                <span id="singleModeTag">普通</span>
                <span id="singleGridTag">28 x 24</span>
              </div>
            </div>
            <div class="single-inline-controls">
              <label>
                <span data-i18n="difficulty">难度</span>
                <select id="singleDifficultyInline">
                  <option value="easy" data-i18n="difficulty_easy">入门</option>
                  <option value="mixed" data-i18n="difficulty_mixed">进阶</option>
                  <option value="hard" data-i18n="difficulty_hard">困难</option>
                </select>
              </label>
              <label>
                <span data-i18n="single_mode">模式</span>
                <select id="singleModeInline">
                  <option value="normal" data-i18n="mode_normal">普通</option>
                  <option value="invincible" data-i18n="mode_invincible">无敌复活</option>
                </select>
              </label>
              <label class="compact-hide">
                <span data-i18n="snake_color">蛇颜色</span>
                <select id="singleSnakeColorInline">
                  <option value="neon" data-i18n="snake_color_neon">霓虹青</option>
                  <option value="forest" data-i18n="snake_color_forest">森林绿</option>
                  <option value="sunset" data-i18n="snake_color_sunset">落日橙</option>
                  <option value="glacier" data-i18n="snake_color_glacier">冰川蓝</option>
                </select>
              </label>
              <label class="compact-hide">
                <span data-i18n="snake_shape">蛇形状</span>
                <select id="singleSnakeShapeInline">
                  <option value="rounded" data-i18n="snake_shape_rounded">圆角块</option>
                  <option value="square" data-i18n="snake_shape_square">方块</option>
                  <option value="circle" data-i18n="snake_shape_circle">圆形</option>
                  <option value="diamond" data-i18n="snake_shape_diamond">菱形</option>
                </select>
              </label>
              <label class="compact-hide">
                <span data-i18n="food_style">豆子样式</span>
                <select id="singleFoodStyleInline">
                  <option value="orb" data-i18n="food_style_orb">光球</option>
                  <option value="crystal" data-i18n="food_style_crystal">水晶</option>
                  <option value="star" data-i18n="food_style_star">星芒</option>
                  <option value="ring" data-i18n="food_style_ring">光环</option>
                </select>
              </label>
              <div class="inline-fields">
                <label>
                  <span data-i18n="grid_cols">列数</span>
                  <input id="singleGridColsInline" type="number" min="16" max="72" step="1" value="28" />
                </label>
                <label>
                  <span data-i18n="grid_rows">行数</span>
                  <input id="singleGridRowsInline" type="number" min="12" max="48" step="1" value="24" />
                </label>
              </div>
            </div>
            <div class="btn-row">
              <button id="singleStartBtn" data-i18n="start_or_resume">开始/继续</button>
              <button id="singlePauseBtn" data-i18n="pause">暂停</button>
              <button id="singleRestartBtn" data-i18n="restart">重开</button>
            </div>

            <div class="dpad-wrap">
              <div class="dpad-title" data-i18n="mouse_control">鼠标方向键</div>
              <div class="dpad-grid">
                <button data-single-dir="up" class="dpad-key top">↑</button>
                <button data-single-dir="left" class="dpad-key left">←</button>
                <button data-single-dir="down" class="dpad-key down">↓</button>
                <button data-single-dir="right" class="dpad-key right">→</button>
              </div>
            </div>

            <p class="hint" id="singleHint"></p>
          </aside>
        </div>
      </section>

      <section id="tab-online" class="tab-panel">
        <div class="online-layout">
          <div class="online-room-card">
            <div class="inline-fields online-room-inline">
              <label>
                <span data-i18n="player_name">你的昵称</span>
                <input
                  id="playerNameInput"
                  type="text"
                  maxlength="14"
                  placeholder="Player"
                  data-i18n-placeholder="player_name_ph"
                />
              </label>
              <label>
                <span data-i18n="room_code">房间号</span>
                <input
                  id="roomCodeInput"
                  type="text"
                  maxlength="6"
                  placeholder="输入 6 位房间号"
                  data-i18n-placeholder="room_code_ph"
                />
              </label>
              <label>
                <span data-i18n="online_mode">模式</span>
                <select id="onlineModeQuick">
                  <option value="separate" data-i18n="online_mode_separate">模式1: 分屏各吃各的</option>
                  <option value="arena" data-i18n="online_mode_arena">模式2: 同屏抢同一颗豆子</option>
                </select>
              </label>
              <label>
                <span data-i18n="difficulty">难度</span>
                <select id="onlineDifficultyQuick">
                  <option value="easy" data-i18n="difficulty_easy">入门</option>
                  <option value="mixed" data-i18n="difficulty_mixed">进阶</option>
                  <option value="hard" data-i18n="difficulty_hard">困难</option>
                </select>
              </label>
            </div>

            <div class="btn-row wrap">
              <button id="createRoomBtn" data-i18n="create_room">创建房间</button>
              <button id="joinRoomBtn" data-i18n="join_room">加入房间</button>
              <button id="startMatchBtn" data-i18n="start_match">开始对战(房主)</button>
              <button id="copyInviteBtn" data-i18n="copy_invite">复制邀请链接</button>
            </div>

            <div class="room-meta">
              <div><span data-i18n="current_room">当前房间</span>: <strong id="currentRoomCode">-</strong></div>
              <div><span data-i18n="online_mode">模式</span>: <strong id="onlineModeTag">-</strong></div>
              <div><span data-i18n="speed_label">速度</span>: <strong id="onlineSpeedTag">5</strong></div>
              <div><span data-i18n="grid_size">网格</span>: <strong id="onlineGridTag">28 x 24</strong></div>
            </div>
            <div class="online-status" id="onlineStatus">未连接房间</div>
          </div>

          <div class="online-board-card">
            <canvas id="onlineArenaCanvas" width="720" height="560" class="hidden"></canvas>

            <div id="onlineSeparateWrap" class="separate-wrap hidden">
              <div class="separate-main">
                <h3 id="mainPlayerLabel">主视角</h3>
                <canvas id="onlineMainCanvas" width="680" height="520"></canvas>
              </div>
              <div id="onlineMiniWrap" class="separate-mini mini-pos-left-top">
                <h4 id="miniPlayerLabel">对手小窗</h4>
                <canvas id="onlineMiniCanvas" width="300" height="220"></canvas>
              </div>
            </div>

            <div id="onlineQuickPanel" class="online-quick-panel panel-pos-right">
              <h4 data-i18n="online_settings">双人设置</h4>
              <label>
                <span data-i18n="online_mode">模式</span>
                <select id="onlineModePanel">
                  <option value="separate" data-i18n="online_mode_separate">模式1: 分屏各吃各的</option>
                  <option value="arena" data-i18n="online_mode_arena">模式2: 同屏抢同一颗豆子</option>
                </select>
              </label>
              <label>
                <span data-i18n="difficulty">难度</span>
                <select id="onlineDifficultyPanel">
                  <option value="easy" data-i18n="difficulty_easy">入门</option>
                  <option value="mixed" data-i18n="difficulty_mixed">进阶</option>
                  <option value="hard" data-i18n="difficulty_hard">困难</option>
                </select>
              </label>
              <label>
                <span data-i18n="speed_label">速度</span>
                <input id="onlineSpeedPanel" type="range" min="1" max="10" value="5" />
                <strong id="onlineSpeedPanelLabel">5</strong>
              </label>
              <label>
                <span data-i18n="mini_position">小窗位置</span>
                <select id="miniMapPositionPanel">
                  <option value="left-top" data-i18n="mini_pos_left_top">左上角</option>
                  <option value="right-top" data-i18n="mini_pos_right_top">右上角</option>
                </select>
              </label>
              <label>
                <span data-i18n="snake_color">蛇颜色</span>
                <select id="onlineSnakeColorPanel">
                  <option value="neon" data-i18n="snake_color_neon">霓虹青</option>
                  <option value="forest" data-i18n="snake_color_forest">森林绿</option>
                  <option value="sunset" data-i18n="snake_color_sunset">落日橙</option>
                  <option value="glacier" data-i18n="snake_color_glacier">冰川蓝</option>
                </select>
              </label>
              <label>
                <span data-i18n="snake_shape">蛇形状</span>
                <select id="onlineSnakeShapePanel">
                  <option value="rounded" data-i18n="snake_shape_rounded">圆角块</option>
                  <option value="square" data-i18n="snake_shape_square">方块</option>
                  <option value="circle" data-i18n="snake_shape_circle">圆形</option>
                  <option value="diamond" data-i18n="snake_shape_diamond">菱形</option>
                </select>
              </label>
              <label>
                <span data-i18n="food_style">豆子样式</span>
                <select id="onlineFoodStylePanel">
                  <option value="orb" data-i18n="food_style_orb">光球</option>
                  <option value="crystal" data-i18n="food_style_crystal">水晶</option>
                  <option value="star" data-i18n="food_style_star">星芒</option>
                  <option value="ring" data-i18n="food_style_ring">光环</option>
                </select>
              </label>
              <label>
                <span data-i18n="food_color">豆子颜色</span>
                <select id="onlineFoodColorPanel">
                  <option value="classic" data-i18n="food_color_classic">经典红</option>
                  <option value="mint" data-i18n="food_color_mint">薄荷绿</option>
                  <option value="violet" data-i18n="food_color_violet">紫晶色</option>
                  <option value="sun" data-i18n="food_color_sun">太阳金</option>
                </select>
              </label>
              <div class="inline-fields">
                <label>
                  <span data-i18n="grid_cols">列数</span>
                  <input id="onlineGridColsPanel" type="number" min="16" max="72" step="1" value="32" />
                </label>
                <label>
                  <span data-i18n="grid_rows">行数</span>
                  <input id="onlineGridRowsPanel" type="number" min="12" max="48" step="1" value="24" />
                </label>
              </div>
              <div class="btn-row wrap">
                <button id="applyOnlineConfigPanelBtn" data-i18n="apply_room_config">应用房间配置</button>
                <button id="applyOnlineStylePanelBtn" data-i18n="apply_style">同步我的样式</button>
              </div>
              <div class="dpad-wrap online-panel-dpad">
                <div class="dpad-title" data-i18n="online_control">双人操作</div>
                <div class="dpad-grid">
                  <button data-online-dir="up" class="dpad-key top">↑</button>
                  <button data-online-dir="left" class="dpad-key left">←</button>
                  <button data-online-dir="down" class="dpad-key down">↓</button>
                  <button data-online-dir="right" class="dpad-key right">→</button>
                </div>
              </div>
            </div>

            <div id="onlineResultBanner" class="result-banner hidden">
              <div class="result-emoji" id="resultEmoji">😄🎉</div>
              <div id="resultText">等待结果</div>
            </div>

            <div id="onlineCountdownBanner" class="countdown-banner hidden">
              <div data-i18n="countdown_title">对战即将开始</div>
              <strong id="onlineCountdownValue">3</strong>
            </div>
          </div>

          <div class="online-bottom">
            <div class="online-score" id="onlineScoreRow">P1 0 : 0 P2</div>
            <div class="dpad-wrap online-bottom-dpad">
              <div class="dpad-title" data-i18n="online_control">双人操作</div>
              <div class="dpad-grid">
                <button data-online-dir="up" class="dpad-key top">↑</button>
                <button data-online-dir="left" class="dpad-key left">←</button>
                <button data-online-dir="down" class="dpad-key down">↓</button>
                <button data-online-dir="right" class="dpad-key right">→</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="settingsModal" class="settings-modal hidden">
      <div class="settings-dialog">
        <div class="settings-head">
          <h2 data-i18n="settings_title">游戏设置</h2>
          <button id="closeSettingsBtn" class="close-btn" aria-label="Close">×</button>
        </div>
        <div class="settings-grid">
          <section class="settings-section">
            <h3 data-i18n="global_settings">全局显示</h3>
            <label>
              <span data-i18n="language">语言</span>
              <select id="languageSelect">
                <option value="zh" data-i18n="lang_zh">中文</option>
                <option value="en" data-i18n="lang_en">English</option>
                <option value="ja" data-i18n="lang_ja">日本語</option>
              </select>
            </label>
            <label>
              <span data-i18n="view_scale">画面缩放</span>
              <input id="viewScaleRange" type="range" min="70" max="140" step="5" value="100" />
              <span id="viewScaleLabel">100%</span>
            </label>
            <label>
              <span data-i18n="cell_size">格子大小</span>
              <input id="cellSizeRange" type="range" min="14" max="30" step="1" value="24" />
              <span id="cellSizeLabel">24px</span>
            </label>
          </section>

          <section class="settings-section">
            <h3 data-i18n="single_settings">单人设置</h3>
            <label>
              <span data-i18n="difficulty">难度</span>
              <select id="singleDifficulty">
                <option value="easy" data-i18n="difficulty_easy">入门</option>
                <option value="mixed" data-i18n="difficulty_mixed">进阶</option>
                <option value="hard" data-i18n="difficulty_hard">困难</option>
              </select>
            </label>
            <label>
              <span data-i18n="speed_label">速度</span>
              <input id="singleSpeed" type="range" min="1" max="10" value="5" />
              <span id="singleSpeedLabel">5</span>
            </label>
            <label>
              <span data-i18n="single_mode">模式</span>
              <select id="singleMode">
                <option value="normal" data-i18n="mode_normal">普通</option>
                <option value="invincible" data-i18n="mode_invincible">无敌复活</option>
              </select>
            </label>
            <label>
              <span data-i18n="snake_color">蛇颜色</span>
              <select id="singleSnakeColor">
                <option value="neon" data-i18n="snake_color_neon">霓虹青</option>
                <option value="forest" data-i18n="snake_color_forest">森林绿</option>
                <option value="sunset" data-i18n="snake_color_sunset">落日橙</option>
                <option value="glacier" data-i18n="snake_color_glacier">冰川蓝</option>
              </select>
            </label>
            <label>
              <span data-i18n="snake_shape">蛇形状</span>
              <select id="singleSnakeShape">
                <option value="rounded" data-i18n="snake_shape_rounded">圆角块</option>
                <option value="square" data-i18n="snake_shape_square">方块</option>
                <option value="circle" data-i18n="snake_shape_circle">圆形</option>
                <option value="diamond" data-i18n="snake_shape_diamond">菱形</option>
              </select>
            </label>
            <label>
              <span data-i18n="food_style">豆子样式</span>
              <select id="singleFoodStyle">
                <option value="orb" data-i18n="food_style_orb">光球</option>
                <option value="crystal" data-i18n="food_style_crystal">水晶</option>
                <option value="star" data-i18n="food_style_star">星芒</option>
                <option value="ring" data-i18n="food_style_ring">光环</option>
              </select>
            </label>
            <div class="inline-fields">
              <label>
                <span data-i18n="grid_cols">列数</span>
                <input id="singleGridCols" type="number" min="16" max="72" step="1" value="28" />
              </label>
              <label>
                <span data-i18n="grid_rows">行数</span>
                <input id="singleGridRows" type="number" min="12" max="48" step="1" value="24" />
              </label>
            </div>
          </section>

          <section class="settings-section">
            <h3 data-i18n="online_settings">双人设置</h3>
            <label>
              <span data-i18n="online_mode">模式</span>
              <select id="onlineModeSetting">
                <option value="separate" data-i18n="online_mode_separate">模式1: 分屏各吃各的</option>
                <option value="arena" data-i18n="online_mode_arena">模式2: 同屏抢同一颗豆子</option>
              </select>
            </label>
            <label>
              <span data-i18n="mini_position">小窗位置</span>
              <select id="miniMapPosition">
                <option value="left-top" data-i18n="mini_pos_left_top">左上角</option>
                <option value="right-top" data-i18n="mini_pos_right_top">右上角</option>
              </select>
            </label>
            <label>
              <span data-i18n="speed_label">速度</span>
              <input id="onlineSpeed" type="range" min="1" max="10" value="5" />
              <span id="onlineSpeedLabel">5</span>
            </label>
            <label>
              <span data-i18n="difficulty">难度</span>
              <select id="onlineDifficultySetting">
                <option value="easy" data-i18n="difficulty_easy">入门</option>
                <option value="mixed" data-i18n="difficulty_mixed">进阶</option>
                <option value="hard" data-i18n="difficulty_hard">困难</option>
              </select>
            </label>
            <label>
              <span data-i18n="snake_color">蛇颜色</span>
              <select id="onlineSnakeColor">
                <option value="neon" data-i18n="snake_color_neon">霓虹青</option>
                <option value="forest" data-i18n="snake_color_forest">森林绿</option>
                <option value="sunset" data-i18n="snake_color_sunset">落日橙</option>
                <option value="glacier" data-i18n="snake_color_glacier">冰川蓝</option>
              </select>
            </label>
            <label>
              <span data-i18n="snake_shape">蛇形状</span>
              <select id="onlineSnakeShape">
                <option value="rounded" data-i18n="snake_shape_rounded">圆角块</option>
                <option value="square" data-i18n="snake_shape_square">方块</option>
                <option value="circle" data-i18n="snake_shape_circle">圆形</option>
                <option value="diamond" data-i18n="snake_shape_diamond">菱形</option>
              </select>
            </label>
            <label>
              <span data-i18n="food_style">豆子样式</span>
              <select id="onlineFoodStyle">
                <option value="orb" data-i18n="food_style_orb">光球</option>
                <option value="crystal" data-i18n="food_style_crystal">水晶</option>
                <option value="star" data-i18n="food_style_star">星芒</option>
                <option value="ring" data-i18n="food_style_ring">光环</option>
              </select>
            </label>
            <label>
              <span data-i18n="food_color">豆子颜色</span>
              <select id="onlineFoodColor">
                <option value="classic" data-i18n="food_color_classic">经典红</option>
                <option value="mint" data-i18n="food_color_mint">薄荷绿</option>
                <option value="violet" data-i18n="food_color_violet">紫晶色</option>
                <option value="sun" data-i18n="food_color_sun">太阳金</option>
              </select>
            </label>
            <div class="inline-fields">
              <label>
                <span data-i18n="grid_cols">列数</span>
                <input id="onlineGridCols" type="number" min="16" max="72" step="1" value="32" />
              </label>
              <label>
                <span data-i18n="grid_rows">行数</span>
                <input id="onlineGridRows" type="number" min="12" max="48" step="1" value="24" />
              </label>
            </div>
            <div class="btn-row wrap">
              <button id="applyOnlineConfigBtn" data-i18n="apply_room_config">应用房间配置</button>
              <button id="applyOnlineStyleBtn" data-i18n="apply_style">同步我的样式</button>
            </div>
            <p id="onlineConfigHint" class="hint"></p>
          </section>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
